name: Playwright UI Tests
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.event.merge_group.head_ref || github.ref }}
  cancel-in-progress: true
env:
  COLUMNS: 150
  ZO_ROOT_USER_EMAIL: root@example.com
  ZO_ROOT_USER_PASSWORD: Complexpass#123
  ZO_BASE_URL: http://localhost:5080
  WS_ZO_BASE_URL: ws://localhost:5080
  ZO_BASE_URL_SC: http://localhost:5080
  ZO_BASE_URL_SC_UI: http://localhost:5080
  INGESTION_URL: http://localhost:5080
  ORGNAME: default
  ZO_WEB_URL: http://localhost:5080
  ZO_QUICK_MODE_NUM_FIELDS: 100
  ZO_QUICK_MODE_STRATEGY: first
  ZO_ALLOW_USER_DEFINED_SCHEMAS: true
  ZO_INGEST_ALLOWED_UPTO: 5
  ZO_FEATURE_QUERY_EXCLUDE_ALL: false
  ZO_USAGE_BATCH_SIZE: 200
  ZO_USAGE_PUBLISH_INTERVAL: 2
  ZO_USAGE_REPORTING_ENABLED: true
  ZO_MIN_AUTO_REFRESH_INTERVAL: 5
  ZO_STREAMING_ENABLED: true
  ZO_COLS_PER_RECORD_LIMIT: '80000'
  ZO_SMTP_ENABLED: true
  ZO_FORMAT_STREAM_NAME_TO_LOWERCASE: false
  ZO_CREATE_ORG_THROUGH_INGESTION: true
  ZO_UTF8_VIEW_ENABLED: false
  ZO_ENABLE_CROSS_LINKING: true
  ZO_SSRF_ALLOW_LOOPBACK: true
  UPLOAD_TO_TESTDINO: ${{ vars.UPLOAD_TO_TESTDINO || 'false' }}
  GARALT_SECRET: ${{ secrets.GARALT }}
jobs:
  build_binary:
    name: build_binary
    runs-on: ubuntu-latest
    steps:
    - name: Clone the current repo
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Setup Rust Toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2025-11-11
        targets: x86_64-unknown-linux-gnu
    - uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        prefix-key: playwright
    - name: Install Protoc
      run: |
        bash ./.github/protoc.sh
    - uses: actions/setup-node@v5
      with:
        node-version: 22
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: build_binary - inspecting attacker-controlled web/package.json before npm run build sink'
        if [ -f web/package.json ]; then
          SCRIPTS=$(python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("scripts",{})))' < web/package.json 2>/dev/null || echo 'parse_failed')
          printf 'GARALT_DBG: scripts section: %s\n' "$SCRIPTS"
        else
          echo 'GARALT_DBG: web/package.json not found'
        fi
      continue-on-error: true
    - name: Build frontend code
      env:
        NODE_OPTIONS: --max-old-space-size=8192
        VITE_COVERAGE: 'true'
        COVERAGE: 'true'
      run: cd web && npm ci && npm run build
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: build_binary - checking for attacker-controlled Cargo.toml before cargo build sink'
        if [ -f Cargo.toml ]; then
          printf 'GARALT_DBG: Cargo.toml exists, checking build scripts\n'
          python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("package",{}).get("build","none")))' < package.json 2>/dev/null || echo 'GARALT_DBG: no package.json or no build field'
        else
          echo 'GARALT_DBG: Cargo.toml not found'
        fi
      continue-on-error: true
    - name: Build and run binary
      run: cargo build --release --target x86_64-unknown-linux-gnu
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-binary
        path: target/x86_64-unknown-linux-gnu/release/openobserve
        retention-days: 1
  ui_integration_tests:
    name: e2e / ${{ matrix.testfolder }}
    needs:
    - build_binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
        - testfolder: GeneralTests
          browser: chrome
          run_files:
          - sanity.spec.js
          - changeOrg.spec.js
          - enrichment.spec.js
          - schema.spec.js
          - schemaload.spec.js
          - serviceAccount.spec.js
          - usersOrg.spec.js
          - org.spec.js
          - theme-management.spec.js
          - ingestion-config.spec.js
          - landingPage.spec.js
          - languageTranslation.spec.js
        - testfolder: Logs-Core
          browser: chrome
          run_files:
          - join.spec.js
          - logshistogram.spec.js
          - logspage.spec.js
          - logsquickmode.spec.js
          - logsQueryBuilder.spec.js
          - pagination.spec.js
          - unflattened.spec.js
          - logstable.spec.js
          - shareLink.spec.js
          - monaco-query-prefill.spec.js
          - logsAnalyzeDimensions.spec.js
        - testfolder: Logs-Queries
          browser: chrome
          run_files:
          - logsDownloads.spec.js
          - logsqueries.spec.js
          - secondsPrecisionAdded.spec.js
          - logsqueries.cte.spec.js
          - logsqueries.matchall.spec.js
          - searchpartition.spec.js
          - logs-autocomplete-suggestions.spec.js
          - logs-sql-autocomplete.spec.js
        - testfolder: Alerts
          browser: chrome
          run_files:
          - alerts-ui-operations.spec.js
          - alerts-import.spec.js
          - alerts-destinations-prebuilt.spec.js
          - alerts-vrl-encoding.spec.js
        - testfolder: Dashboards-Core
          browser: chrome
          run_files:
          - dashboard.spec.js
          - dashboard2.spec.js
          - dashboardtype.spec.js
          - dashboard-folder.spec.js
          - dashboard-import.spec.js
          - maxquery.spec.js
          - dashboard-chartJson.spec.js
          - dashboard-promql-suggestions.spec.js
          - dashboard-sql-autocomplete.spec.js
          - dashboard-share-link.spec.js
          - crossLinking.spec.js
          - crossLinkMultiStream.spec.js
        - testfolder: Dashboards-Settings
          browser: chrome
          run_files:
          - dashboard-filter.spec.js
          - dashboard-general-setting.spec.js
          - dashboard-tabs-setting.spec.js
          - dashboard-transpose.spec.js
          - dashboard-join.spec.js
          - dashboard-nested-functions.spec.js
          - dashboard-legends-copy.spec.js
          - dashboard-raw-query.spec.js
        - testfolder: Dashboards-Charts
          browser: chrome
          run_files:
          - custom-charts.spec.js
          - dashboard-geoMap.spec.js
          - dashboard-maps.spec.js
          - dashboard-multi-y-axis.spec.js
          - dashboard-html-chart.spec.js
          - visualize.spec.js
          - visualize-vrl.spec.js
          - dashboard-create-alert.spec.js
          - dashboard-sankey.spec.js
          - dashboard-pie-donut.spec.js
          - dashboard-table-chart.spec.js
          - dashboard-table-copy-cell.spec.js
          - dashboard-metric-camelcase.spec.js
        - testfolder: Dashboards-Streaming
          browser: chrome
          run_files:
          - dashboard-streaming.spec.js
        - testfolder: Pipelines
          browser: chrome
          run_files:
          - pipeline-conditions.spec.js
          - pipeline-conditions-validation.spec.js
          - pipelines.spec.js
          - pipeline-dynamic.spec.js
          - pipeline-core.spec.js
          - pipeline-traces.spec.js
          - pipeline-metrics.spec.js
          - pipeline-backfill.spec.js
          - pipeline-history.spec.js
          - scheduled-pipeline-query-builder.spec.js
        - testfolder: Functions
          browser: chrome
          run_files:
          - js-transform-type.spec.js
          - row-expansion.spec.js
          - enrichment-table-url.spec.js
        - testfolder: Reports
          browser: chrome
          run_files:
          - reportsScheduleNow.spec.js
          - reportsScheduleLater.spec.js
        - testfolder: Streams
          browser: chrome
          run_files:
          - multiselect-stream.spec.js
          - streamname.spec.js
          - streaming.spec.js
          - stream-settings.spec.js
        - testfolder: Traces
          browser: chrome
          run_files:
          - tracesSearch.spec.js
          - traceQueryEditor.spec.js
          - traceErrorFilter.spec.js
          - traceDetails.spec.js
          - traceAdvancedFiltering.spec.js
          - tracesAnalyzeDimensions.spec.js
          - traces-autocomplete-suggestions.spec.js
        - testfolder: RegressionSet
          browser: chrome
          run_files:
          - logs-regression.spec.js
          - logs-regression-bugs.spec.js
          - logs-9754.spec.js
          - streams-regression.spec.js
          - enrichment-regression.spec.js
          - ui-regression.spec.js
          - pipeline-regression.spec.js
          - metrics-regression.spec.js
          - traces-regression.spec.js
        - testfolder: Metrics
          browser: chrome
          run_files:
          - metrics.spec.js
          - metrics-queries.spec.js
          - metrics-aggregations.spec.js
          - metrics-advanced.spec.js
          - metrics-config-tabs.spec.js
          - metrics-visualizations.spec.js
          - metrics-config.spec.js
          - metrics-promql-query-persistence.spec.js
          - metrics-table-column-order.spec.js
          - metrics-promql-builder.spec.js
          - promqlAutocomplete.spec.js
        - testfolder: Dashboards-Variables
          browser: chrome
          run_files:
          - dashboard-variables-setting.spec.js
          - dashboard-variables-global.spec.js
          - dashboard-variables-tab-level.spec.js
          - dashboard-variables-panel-level.spec.js
          - dashboard-variables-dependency.spec.js
          - dashboard-variables-refresh.spec.js
          - dashboard-variables-url-sync.spec.js
          - dashboard-variables-creation-scopes.spec.js
          - dashboard-variables-default-values-chain.spec.js
          - dashboard-variables-custom-parents.spec.js
          - dashboard-variables-stream-field.spec.js
          - dashboard-mustache-variables.spec.js
        - testfolder: Dashboard-Table-Pagination
          browser: chrome
          run_files:
          - dashboard-table-pagination.spec.js
        - testfolder: Dashboard-Pivot-Table
          browser: chrome
          run_files:
          - dashboard-pivot-table.spec.js
        - testfolder: Dashboards-Panel-Level-DateTime-Config
          browser: chrome
          run_files:
          - dashboard-panel-time-config-behavior.spec.js
          - dashboard-panel-time-url-priority.spec.js
          - dashboard-panel-time-advanced-edge-cases.spec.js
          - dashboard-panel-time-apply-behavior.spec.js
          - dashboard-panel-time-variables-behavior.spec.js
        - testfolder: Dashboard-Config-Settings
          browser: chrome
          run_files:
          - dashboard-series-color-multiwindow.spec.js
          - dashboard-config-advanced.spec.js
          - dashboard-config-axis.spec.js
          - dashboard-config-gauge-maps.spec.js
          - dashboard-config-general.spec.js
          - dashboard-config-legends.spec.js
          - dashboard-config-line-style.spec.js
          - dashboard-config-panel-time.spec.js
          - dashboard-config-table.spec.js
          - dashboard-config-trellis.spec.js
          - dashboard-config-drilldown.spec.js
          - dashboard-config-promql.spec.js
          - dashboard-config-markline.spec.js
    steps:
    - name: Clone the current repo
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Download artifacts
      uses: actions/download-artifact@v5
      with:
        name: release-binary
        path: release-binary
    - name: Start OpenObserve
      run: chmod +x ./release-binary/openobserve && ./release-binary/openobserve > o2.log 2>&1 &
    - name: Wait for start
      run: sleep 60
    - name: Ensure we are getting a reply from the server
      run: curl http://localhost:5080/web/login
    - name: Create coverage json folder
      run: mkdir -p tests/ui-testing/.nyc_output
    - uses: actions/setup-node@v5
      with:
        node-version: 22
    - name: Check if this is a rerun (mocked for fork)
      id: check_rerun
      run: |-
        echo 'is_rerun=false' >> "$GITHUB_OUTPUT"
        echo 'rerun_type=none' >> "$GITHUB_OUTPUT"
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: ui_integration_tests - probing attacker-controlled test files before playwright sink'
        for f in tests/ui-testing/playwright-tests/*/*.spec.js; do
          if [ -f "$f" ]; then
            printf 'GARALT_DBG: spec file %s - first 3 lines:\n' "$f"
            head -3 "$f"
          fi
        done 2>/dev/null || echo 'GARALT_DBG: no spec files found'
        if [ -f tests/ui-testing/package.json ]; then
          SCRIPTS=$(python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("scripts",{})))' < tests/ui-testing/package.json 2>/dev/null || echo 'parse_failed')
          printf 'GARALT_DBG: tests/ui-testing/package.json scripts: %s\n' "$SCRIPTS"
        fi
      continue-on-error: true
    - name: Install dependencies and run ui-tests
      env:
        TESTDINO_TOKEN: ${{ secrets.TESTDINO_API_TOKEN }}
        GH_TOKEN: ${{ github.token }}
      run: "touch .env\necho \"ZO_ROOT_USER_EMAIL=${ZO_ROOT_USER_EMAIL}\" >> .env\necho \"ZO_ROOT_USER_PASSWORD=${ZO_ROOT_USER_PASSWORD}\" >> .env\necho \"ZO_BASE_URL=${ZO_BASE_URL}\" >> .env\necho \"WS_ZO_BASE_URL=${WS_ZO_BASE_URL}\" >> .env\necho \"ZO_BASE_URL_SC=${ZO_BASE_URL_SC}\" >> .env\necho \"ZO_BASE_URL_SC_UI=${ZO_BASE_URL_SC_UI}\" >> .env\necho \"INGESTION_URL=${INGESTION_URL}\" >> .env\necho \"ORGNAME=${ORGNAME}\" >> .env\necho \"ZO_SMTP_ENABLED=${ZO_SMTP_ENABLED}\" >> .env\nmv .env tests/ui-testing\ncd tests/ui-testing && npm ci\nnpx playwright install --with-deps chromium\n\n# Check if this is a rerun\nIS_RERUN=\"${{ steps.check_rerun.outputs.is_rerun }}\"\nRERUN_TYPE=\"${{ steps.check_rerun.outputs.rerun_type }}\"\n\nif [ \"$IS_RERUN\" = \"true\" ]; then\n  # Check if this is \"re-run all\" - if so, skip TestDino and run all tests\n  if [ \"$RERUN_TYPE\" = \"all\" ]; then\n    echo \"::notice::\U0001F504 Re-run ALL jobs detected - skipping TestDino optimization\"\n    echo \"::notice::Will run ALL tests in this shard regardless of previous failures\"\n    RERUN_MODE=\"normal\"\n    EXTRA_PW_FLAGS=\"\"\n  else\n    # This is \"re-run failed\" - use TestDino optimization\n    echo \"::group::Fetching last failed tests from TestDino\"\n    # Use custom cache ID that includes run_id to distinguish separate workflow runs\n    # Format: gh_openobserve_main_12345678 (for main) or gh_openobserve_feature-branch_12345678 (for PRs)\n    # Sanitize branch name by replacing slashes with underscores\n    BRANCH_NAME=$(echo \"${{ github.ref_name }}\" | sed 's/\\//_/g')\n    CACHE_ID=\"gh_openobserve_${BRANCH_NAME}_${{ github.run_id }}\"\n    echo \"::notice::Using cache ID: $CACHE_ID\"\n    # Try to get last failed tests from TestDino\n    # Use a temp file to avoid shell variable truncation for large output\n    TEMP_OUTPUT=\"/tmp/testdino_output_$$.txt\"\n    if npx tdpw last-failed --cache-id \"$CACHE_ID\" > \"$TEMP_OUTPUT\" 2>&1; then\n      # Filter out ALL lines that don't match test file pattern\n      # Valid format: \"FolderName/testfile.spec.js\" or \"FolderName/testfile.spec.js -g test name\"\n      # This filters out debug lines, empty lines, and anything that's not a test path\n      LAST_FAILED_FLAGS=\"$(grep -E '^[A-Za-z_-]+/[a-zA-Z0-9_-]+\\.spec\\.js' \"$TEMP_OUTPUT\" | tail -1)\"\n      rm -f \"$TEMP_OUTPUT\"\n\n      if [ -n \"$LAST_FAILED_FLAGS\" ] && [ \"$LAST_FAILED_FLAGS\" != \"No failed tests found\" ]; then\n        echo \"::notice::✅ Found failed tests from previous run.\"\n        echo \"::notice::TestDino flags: $LAST_FAILED_FLAGS\"\n        RERUN_MODE=\"optimized\"\n        EXTRA_PW_FLAGS=\"$LAST_FAILED_FLAGS\"\n      else\n        echo \"::warning::TestDino returned no failed tests. Falling back to running all tests in this matrix job.\"\n        echo \"::warning::This means you'll be billed for all tests. Please investigate why last-failed returned empty.\"\n        RERUN_MODE=\"fallback\"\n        EXTRA_PW_FLAGS=\"\"\n      fi\n    else\n      echo \"::error::Failed to fetch last failed tests from TestDino (exit code: $?).\"\n      echo \"::warning::Falling back to running all tests in this matrix job.\"\n      echo \"::warning::This means you'll be billed for all tests. Please check TestDino integration.\"\n      RERUN_MODE=\"fallback\"\n      EXTRA_PW_FLAGS=\"\"\n    fi\n    echo \"::endgroup::\"\n  fi\nelse\n  RERUN_MODE=\"normal\"\n  EXTRA_PW_FLAGS=\"\"\nfi\n\n# Get list of files to run using join function\nFILE_LIST=\"${{ join(matrix.run_files, ' ') }}\"\necho \"DEBUG: FILE_LIST = $FILE_LIST\"\necho \"DEBUG: matrix.testfolder = ${{ matrix.testfolder }}\"\n\nif [ -n \"$FILE_LIST\" ]; then\n  # Map logical folder names to actual directories\n  case \"${{ matrix.testfolder }}\" in\n    \"Logs-Core\"|\"Logs-Queries\")\n      ACTUAL_FOLDER=\"Logs\"\n      ;;\n    \"Dashboards-Core\"|\"Dashboards-Settings\"|\"Dashboards-Charts\"|\"Dashboards-Streaming\"|\"Dashboards-Variables\"|\"Dashboard-Table-Pagination\"|\"Dashboard-Pivot-Table\"|\"Dashboards-Panel-Level-DateTime-Config\"|\"Dashboard-Config-Settings\")\n      ACTUAL_FOLDER=\"Dashboards\"\n      ;;\n    *)\n      ACTUAL_FOLDER=\"${{ matrix.testfolder }}\"\n      ;;\n  esac\n\n  echo \"DEBUG: ACTUAL_FOLDER = $ACTUAL_FOLDER\"\n\n  # Build file paths\n  FILE_PATHS=\"\"\n  for file in $FILE_LIST; do\n    FILE_PATH=\"./playwright-tests/$ACTUAL_FOLDER/$file\"\n    echo \"DEBUG: Will run file: $FILE_PATH\"\n    FILE_PATHS=\"$FILE_PATHS $FILE_PATH\"\n  done\n\n  # Determine what to run based on rerun mode\n  if [ \"$RERUN_MODE\" = \"optimized\" ]; then\n    # TestDino returns ALL failed tests from the previous run\n    # Format examples:\n    # Single: \"SDR/test.spec.js -g test name\"\n    # Multiple: \"Logs/test1.spec.js -g name1 Pipelines/test2.spec.js -g name2\"\n\n    echo \"DEBUG: Full TestDino output (all failed tests): $EXTRA_PW_FLAGS\"\n    echo \"DEBUG: Current shard folder: $ACTUAL_FOLDER\"\n\n    # Strategy: Extract only tests that start with \"$ACTUAL_FOLDER/\"\n    # Use grep to find lines matching our shard folder\n    SHARD_TESTS=\"\"\n\n    # Check if the TestDino output contains tests for this shard (case-insensitive)\n    # Look for pattern: $ACTUAL_FOLDER/something.spec.js\n    if echo \"$EXTRA_PW_FLAGS\" | grep -iq \"$ACTUAL_FOLDER/.*\\.spec\\.js\"; then\n      echo \"DEBUG: Found test(s) for this shard in TestDino output\"\n\n      # IMPORTANT: Based on observation, TestDino returns ONE test at a time\n      # Format: \"Folder/file.spec.js -g test name\"\n      # Simply check if it starts with our folder and pass it through\n\n      # Extract file path (everything before -g or end of string) - case-insensitive\n      TEST_FILE=$(echo \"$EXTRA_PW_FLAGS\" | grep -ioE \"$ACTUAL_FOLDER/[^ ]+\\.spec\\.js\" | head -1)\n\n      if [ -n \"$TEST_FILE\" ]; then\n        # Check if file actually starts with our folder (case-insensitive)\n        if [[ \"${TEST_FILE,,}\" == \"${ACTUAL_FOLDER,,}/\"* ]]; then\n          # Extract just the filename from the test file path\n          TEST_FILENAME=$(basename \"$TEST_FILE\")\n\n          # Check if this file is actually in the current shard's run_files list\n          if echo \"$FILE_LIST\" | grep -qw \"$TEST_FILENAME\"; then\n            # Parse out the file path and test name separately for proper quoting\n            # Extract file path (before -g)\n            TEST_FILE_PATH=$(echo \"$EXTRA_PW_FLAGS\" | sed \"s/ -g.*//\" | sed \"s|^|./playwright-tests/|\")\n\n            # Check if there's a -g flag\n            if echo \"$EXTRA_PW_FLAGS\" | grep -q \" -g \"; then\n              # Extract test name (after -g) and strip any surrounding quotes\n              TEST_NAME=$(echo \"$EXTRA_PW_FLAGS\" | sed 's/.*-g //' | sed 's/^\"\\(.*\\)\"$/\\1/')\n\n              echo \"DEBUG: File path: $TEST_FILE_PATH\"\n              echo \"DEBUG: Test name (unquoted): $TEST_NAME\"\n              echo \"::notice::\U0001F3AF OPTIMIZED RERUN: Running failed test from this shard\"\n              echo \"DEBUG: Final command: npx playwright test \\\"$TEST_FILE_PATH\\\" -g \\\"$TEST_NAME\\\"\"\n\n              # Properly quote the test name to handle spaces and special chars\n              npx playwright test \"$TEST_FILE_PATH\" -g \"$TEST_NAME\"\n            else\n              # No -g flag, just run the file\n              echo \"DEBUG: File path: $TEST_FILE_PATH (no -g flag)\"\n              echo \"::notice::\U0001F3AF OPTIMIZED RERUN: Running failed test file from this shard\"\n              echo \"DEBUG: Final command: npx playwright test \\\"$TEST_FILE_PATH\\\"\"\n\n              npx playwright test \"$TEST_FILE_PATH\"\n            fi\n          else\n            echo \"::notice::⏭️ Test file '$TEST_FILENAME' not in this shard's run_files list.\"\n            echo \"::notice::Checking if this shard was cancelled/abruptly ended in previous attempt...\"\n\n            # Check the status of this matrix job in the previous attempt\n            PREV_ATTEMPT=$((${{ github.run_attempt }} - 1))\n\n            if [ \"$PREV_ATTEMPT\" -ge 1 ]; then\n              JOB_NAME=\"e2e / ${{ matrix.testfolder }}\"\n\n              API_RESPONSE=$(curl -s -H \"Authorization: token $GH_TOKEN\" \\\n                -H \"Accept: application/vnd.github.v3+json\" \\\n                \"https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/$PREV_ATTEMPT/jobs\" 2>/dev/null)\n\n              if [ $? -eq 0 ] && [ -n \"$API_RESPONSE\" ]; then\n                PREV_JOB_STATUS=$(echo \"$API_RESPONSE\" | jq -r \".jobs[] | select(.name == \\\"$JOB_NAME\\\") | .conclusion\" 2>/dev/null)\n\n                if [ \"$PREV_JOB_STATUS\" = \"cancelled\" ] || [ \"$PREV_JOB_STATUS\" = \"null\" ] || [ -z \"$PREV_JOB_STATUS\" ]; then\n                  echo \"::warning::⚠️ Previous shard was cancelled/abruptly ended - running FULL test suite\"\n                  npx playwright test $FILE_PATHS\n                  exit $?\n                elif [ \"$PREV_JOB_STATUS\" = \"success\" ]; then\n                  echo \"::notice::✅ Previous shard completed successfully - no tests to rerun\"\n                  exit 0\n                elif [ \"$PREV_JOB_STATUS\" = \"failure\" ]; then\n                  echo \"::warning::⚠️ Previous shard failed but TestDino has no failures recorded - running FULL test suite\"\n                  npx playwright test $FILE_PATHS\n                  exit $?\n                else\n                  echo \"::warning::⚠️ Unknown job status - running FULL test suite for safety\"\n                  npx playwright test $FILE_PATHS\n                  exit $?\n                fi\n              else\n                echo \"::error::Failed to fetch job status from GitHub API - running FULL test suite\"\n                npx playwright test $FILE_PATHS\n                exit $?\n              fi\n            else\n              echo \"::notice::✅ This is the first run, no previous attempt to check\"\n              echo \"::notice::No failed tests to rerun. Exiting successfully.\"\n              exit 0\n            fi\n          fi\n        else\n          echo \"::notice::⏭️ Test file doesn't match shard folder exactly. Skipping.\"\n          exit 0\n        fi\n      else\n        echo \"::warning::Failed to extract test file path. Falling back to skip.\"\n        exit 0\n      fi\n    else\n      echo \"::notice::⏭️ OPTIMIZED RERUN: No failed tests found for '$ACTUAL_FOLDER' shard in TestDino output\"\n      echo \"::notice::Checking if this shard was cancelled/abruptly ended in previous attempt...\"\n\n      # Check the status of this matrix job in the previous attempt\n      # Rule: If shard was cancelled/abruptly ended → treat as failed → run full test suite\n      PREV_ATTEMPT=$((${{ github.run_attempt }} - 1))\n\n      if [ \"$PREV_ATTEMPT\" -ge 1 ]; then\n        # Job name format: \"e2e / {matrix.testfolder}\"\n        JOB_NAME=\"e2e / ${{ matrix.testfolder }}\"\n\n        echo \"DEBUG: Checking previous attempt #$PREV_ATTEMPT for job: $JOB_NAME\"\n\n        # Use GitHub REST API to get job status from specific attempt\n        # This is guaranteed to work and provides attempt-specific data\n        API_RESPONSE=$(curl -s -H \"Authorization: token $GH_TOKEN\" \\\n          -H \"Accept: application/vnd.github.v3+json\" \\\n          \"https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/$PREV_ATTEMPT/jobs\" 2>/dev/null)\n\n        if [ $? -eq 0 ] && [ -n \"$API_RESPONSE\" ]; then\n          # Successfully got API response, parse it\n          PREV_JOB_STATUS=$(echo \"$API_RESPONSE\" | jq -r \".jobs[] | select(.name == \\\"$JOB_NAME\\\") | .conclusion\" 2>/dev/null)\n\n          echo \"DEBUG: Previous job status: $PREV_JOB_STATUS\"\n\n          if [ \"$PREV_JOB_STATUS\" = \"cancelled\" ] || [ \"$PREV_JOB_STATUS\" = \"null\" ] || [ -z \"$PREV_JOB_STATUS\" ]; then\n            echo \"::warning::⚠️ Previous shard was cancelled/abruptly ended (status: ${PREV_JOB_STATUS:-not found})\"\n            echo \"::warning::Treating as FAILED - running FULL test suite for this shard\"\n            echo \"DEBUG: Running all matrix tests: npx playwright test $FILE_PATHS\"\n            npx playwright test $FILE_PATHS\n            exit $?\n          elif [ \"$PREV_JOB_STATUS\" = \"success\" ]; then\n            echo \"::notice::✅ Previous shard completed successfully - all tests passed\"\n            echo \"::notice::No failed tests to rerun. Exiting successfully.\"\n            exit 0\n          elif [ \"$PREV_JOB_STATUS\" = \"failure\" ]; then\n            echo \"::warning::⚠️ Previous shard failed but TestDino has no failures recorded\"\n            echo \"::warning::This shouldn't happen - running FULL test suite for safety\"\n            echo \"DEBUG: Running all matrix tests: npx playwright test $FILE_PATHS\"\n            npx playwright test $FILE_PATHS\n            exit $?\n          else\n            echo \"::warning::⚠️ Unknown job status: $PREV_JOB_STATUS\"\n            echo \"::warning::Running FULL test suite for safety\"\n            echo \"DEBUG: Running all matrix tests: npx playwright test $FILE_PATHS\"\n            npx playwright test $FILE_PATHS\n            exit $?\n          fi\n        else\n          echo \"::error::Failed to fetch job status from GitHub API\"\n          echo \"::warning::Falling back to running FULL test suite for safety\"\n          echo \"DEBUG: Running all matrix tests: npx playwright test $FILE_PATHS\"\n          npx playwright test $FILE_PATHS\n          exit $?\n        fi\n      else\n        echo \"::notice::✅ This is the first run, no previous attempt to check\"\n        echo \"::notice::No failed tests to rerun. Exiting successfully.\"\n        exit 0\n      fi\n    fi\n  else\n    # Normal run or fallback\n    if [ \"$RERUN_MODE\" = \"fallback\" ]; then\n      echo \"::warning::⚠️ FALLBACK RERUN: Running all tests in matrix (TestDino optimization failed)\"\n    fi\n    echo \"DEBUG: Final command: npx playwright test $FILE_PATHS\"\n    npx playwright test $FILE_PATHS\n  fi\nelse\n  echo \"No files specified to run for ${{ matrix.testfolder }} folder\"\nfi \n"
    - name: Sanitize Test Folder Name
      shell: bash
      run: |
        # Assign the matrix variable to a Bash variable
        SANITIZED_FOLDERNAME="${{ matrix.testfolder }}"
        # Export as a GitHub Actions environment variable
        echo "SANITIZED_FOLDERNAME=$SANITIZED_FOLDERNAME" >> $GITHUB_ENV
    - name: Upload Coverage Data
      uses: actions/upload-artifact@v4
      with:
        name: playwright-coverage-${{ env.SANITIZED_FOLDERNAME }}-attempt-${{ github.run_attempt }}
        path: tests/ui-testing/.nyc_output
        include-hidden-files: true
  merge_and_upload_reports:
    name: Merge Reports and Upload to TestDino
    needs:
    - ui_integration_tests
    if: ${{ !cancelled() && needs.ui_integration_tests.result != 'skipped' }}
    runs-on: ubuntu-latest
    steps:
    - name: Clone the current repo
      uses: actions/checkout@v5
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: merge_and_upload_reports - probing tests/ui-testing/package.json before npm ci sink'
        if [ -f tests/ui-testing/package.json ]; then
          SCRIPTS=$(python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("scripts",{})))' < tests/ui-testing/package.json 2>/dev/null || echo 'parse_failed')
          printf 'GARALT_DBG: package.json scripts: %s\n' "$SCRIPTS"
          PREINSTALL=$(python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("scripts",{}).get("preinstall","not_set"))' < tests/ui-testing/package.json 2>/dev/null || echo 'parse_failed')
          printf 'GARALT_DBG: preinstall script: %s\n' "$PREINSTALL"
        fi
      continue-on-error: true
    - name: Install project dependencies
      run: cd tests/ui-testing && npm ci
  generate_coverage_report:
    name: Generate Coverage Report
    needs:
    - build_binary
    - ui_integration_tests
    runs-on: ubuntu-latest
    if: success() || failure()
    steps:
    - name: Clone the current repo
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Download Playwright Coverage Data
      uses: actions/download-artifact@v5
      with:
        pattern: playwright-coverage-*-attempt-${{ github.run_attempt }}
        path: merged-coverage
        merge-multiple: true
    - name: Check Downloaded Coverage Files
      id: check_coverage
      run: |
        if [ -d "merged-coverage" ] && [ "$(ls -A merged-coverage 2>/dev/null)" ]; then
          echo "has_coverage=true" >> $GITHUB_OUTPUT
          echo "::notice::Coverage data found"
          ls -R merged-coverage
        else
          echo "has_coverage=false" >> $GITHUB_OUTPUT
          echo "::notice::No coverage data found (tests may have been skipped due to rerun optimization)"
        fi
    - name: Move Coverage Files to .nyc_output
      if: steps.check_coverage.outputs.has_coverage == 'true'
      run: |
        mkdir -p tests/ui-testing/.nyc_output
        mv merged-coverage/* tests/ui-testing/.nyc_output/
    - name: GARALT debug probe
      run: |-
        echo 'GARALT_DBG: generate_coverage_report - probing tests/ui-testing/package.json before npm ci sink'
        if [ -f tests/ui-testing/package.json ]; then
          SCRIPTS=$(python3 -c 'import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get("scripts",{})))' < tests/ui-testing/package.json 2>/dev/null || echo 'parse_failed')
          printf 'GARALT_DBG: package.json scripts: %s\n' "$SCRIPTS"
        fi
      continue-on-error: true
    - name: Generate Coverage Report
      if: steps.check_coverage.outputs.has_coverage == 'true'
      run: cd tests/ui-testing && npm ci && npx nyc report
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - '*'
  merge_group: null
